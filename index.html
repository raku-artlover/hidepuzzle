<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HIDE PUZZLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  margin:0;
  background:#fff;
  font-family: Helvetica, Arial, sans-serif;
  touch-action: none;
  display:flex;
  justify-content:center;
}
.screen{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#fff;
  z-index:5;
}
h1{
  font-size:48px;
  letter-spacing:0.05em;
  margin-bottom:20px;
  text-align:center;
}
.btn{
  padding:12px 40px;
  border:2px solid #000;
  font-size:18px;
  background:none;
  cursor:pointer;
  margin:5px;
  user-select:none;
}
#fade{
  position:absolute;
  inset:0;
  background:#fff;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.5s ease-in-out;
  z-index:10;
}
#game{
  display:none;
  flex-direction:column;
  align-items:center;
  position:relative;
  width:100%;
  max-width:500px;
}
canvas{
  background:#fff;
  touch-action:none;
  width:90%;
  max-width:450px;
  height:auto;
  margin-top:10px;
}
#timer{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:20px;
  font-weight:bold;
}
#bestScoreUI{
  position:absolute;
  top:10px;
  right:10px;
  font-size:16px;
}
#home{ position:absolute; top:10px; right:10px; }
#reset{ position:absolute; top:10px; left:10px; }
#spaceLife{
  display:flex;
  gap:10px;
  margin:8px 0;
  justify-content:center;
}
.lifeDot{
  width:20px;
  height:20px;
  border-radius:50%;
  background:#000;
}
#revealBtnContainer{
  display:flex;
  justify-content:center;
  margin-top:10px;
  margin-bottom:10px;
}
#levelButtons button:disabled{ opacity:0.3; cursor:not-allowed; }
#levelButtons{ display:flex; flex-wrap:wrap; justify-content:center; max-width:300px; margin:10px 0; }
</style>
</head>
<body>

<div id="title" class="screen">
  <h1>HIDE PUZZLE</h1>
  <button id="start" class="btn">START</button>
  <button id="menu" class="btn">MENU</button>
</div>

<div id="menuScreen" class="screen" style="display:none; flex-direction:column;">
  <h1>SELECT LEVEL</h1>
  <div id="levelButtons"></div>
  <button id="menuBack" class="btn">BACK</button>
</div>

<div id="clear" class="screen" style="display:none">
  <h1 id="clearText"></h1>
  <p id="scoreText" style="font-size:20px;"></p>
  <button id="next" class="btn">NEXT STAGE</button>
  <button id="retry" class="btn">RETRY</button>
  <button id="clearHome" class="btn">HOME</button>
</div>

<div id="gameOver" class="screen" style="display:none">
  <h1>GAME OVER</h1>
  <button id="goHome" class="btn">HOME</button>
  <button id="goRetry" class="btn">RETRY</button>
</div>

<div id="fade"></div>

<div id="game">
  <button id="reset" class="btn">RESET</button>
  <button id="home" class="btn">HOME</button>
  <div id="timer">TIME: 0.0s</div>
  <div id="bestScoreUI">BEST: 0.0s</div>

  <canvas id="c" width="450" height="450"></canvas>

  <div id="revealBtnContainer">
    <button id="revealBtn" class="btn">REVEAL</button>
  </div>
  <div id="spaceLife"></div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let LEVELS = [4,5,6,7];
let levels = LEVELS;
let level = 0;
let cleared = false;
let reveal = false;

let gridSize, cell, gridX, gridY;
let pieces = [];
let dragging = null;
let ox = 0, oy = 0;

const BOARD_PIXEL = 300;

const fade = document.getElementById("fade");
const title = document.getElementById("title");
const menuScreen = document.getElementById("menuScreen");
const levelButtonsDiv = document.getElementById("levelButtons");
const menuBack = document.getElementById("menuBack");
const gameUI = document.getElementById("game");
const clearUI = document.getElementById("clear");
const clearText = document.getElementById("clearText");
const scoreText = document.getElementById("scoreText");
const timerUI = document.getElementById("timer");
const bestScoreUI = document.getElementById("bestScoreUI");
const homeBtn = document.getElementById("home");
const spaceLifeDiv = document.getElementById("spaceLife");
const revealBtn = document.getElementById("revealBtn");
const resetBtn = document.getElementById("reset");

let startTime, elapsedTime=0;
let timerInterval;
let bestScores = JSON.parse(localStorage.getItem("bestScores")||"{}");
let reachedLevel = JSON.parse(localStorage.getItem("reachedLevel") || '{"L1":0}');
let spaceLife = 4;
let spacePressed = false;

function transitionScreen(hideElem, showElem, callback){
  hideElem.style.zIndex = 20;
  showElem.style.display = "flex";
  showElem.style.opacity = 0;
  showElem.style.zIndex = 10;

  hideElem.style.transition = "opacity 0.5s ease-in-out";
  showElem.style.transition = "opacity 0.5s ease-in-out";

  setTimeout(()=>{
    hideElem.style.opacity = 0;
    showElem.style.opacity = 1;
  }, 50);

  setTimeout(()=>{
    hideElem.style.display = "none";
    hideElem.style.opacity = 1;
    hideElem.style.zIndex = 5;
    showElem.style.zIndex = 5;
    if(callback) callback();
  }, 550);
}

document.getElementById("start").onclick = () => { transitionScreen(title, gameUI, ()=>startLevel()); };
document.getElementById("menu").onclick = () => { transitionScreen(title, menuScreen, ()=>renderLevelButtons()); };
menuBack.onclick = () => { transitionScreen(menuScreen, title); };
document.getElementById("next").onclick = () => { 
  level++;
  if(level>=levels.length){ levels.push(levels.length + 4); }
  transitionScreen(clearUI, gameUI, ()=>startLevel()); 
};
document.getElementById("retry").onclick = () => { transitionScreen(clearUI, gameUI, ()=>startLevel()); };
resetBtn.onclick = startLevel;
homeBtn.onclick = () => { startLevel(); transitionScreen(gameUI, title); };
document.getElementById("clearHome").onclick = ()=>{ transitionScreen(clearUI, title); };
document.getElementById("goHome").onclick = ()=>{ transitionScreen(gameOver, title); };
document.getElementById("goRetry").onclick = ()=>{ transitionScreen(gameOver, gameUI, ()=>startLevel()); };

window.addEventListener("keydown", e => {
  if(e.code==="Space" && !cleared && !spacePressed){
    spacePressed = true;
    if(spaceLife > 0){
      reveal = true;
      dragging = null;
      elapsedTime += 5;
      spaceLife--;
      renderSpaceLife();
      if(spaceLife <= 0) showGameOver();
    }
  }
});

window.addEventListener("keyup", e => { if(e.code==="Space"){ spacePressed = false; reveal = false; } });

revealBtn.addEventListener("touchstart", e=>{
  e.preventDefault();
  if(!cleared && spaceLife > 0){
    reveal = true;
    dragging = null;
    elapsedTime += 5;
    spaceLife--;
    renderSpaceLife();
    if(spaceLife <= 0) showGameOver();
  }
});
revealBtn.addEventListener("touchend", e=>{ reveal = false; });

function renderSpaceLife(){
  spaceLifeDiv.innerHTML="";
  for(let i=0;i<spaceLife;i++){
    const dot = document.createElement("div");
    dot.className="lifeDot";
    spaceLifeDiv.appendChild(dot);
  }
}

function renderLevelButtons() {
  levelButtonsDiv.innerHTML = "";
  LEVELS.forEach((size,i)=>{
    const btn = document.createElement("button");
    btn.className="btn";
    btn.textContent=`${size}×${size}`;
    if(i>reachedLevel.L1) btn.disabled=true;
    btn.onclick = ()=>{
      levels=LEVELS; level=i;
      transitionScreen(menuScreen, gameUI, ()=>startLevel());
    };
    levelButtonsDiv.appendChild(btn);
  });
}

function splitBoard(size){
  const cells=[];
  for(let y=0;y<size;y++)for(let x=0;x<size;x++)cells.push({x,y,used:false});
  const result=[];
  while(cells.some(c=>!c.used)){
    const start=cells.find(c=>!c.used);
    start.used=true;
    const piece=[start];
    const maxPieceSize = Math.min(size, 2 + Math.floor(size/3));
    const target = Math.floor(Math.random()*maxPieceSize)+2;

    while(piece.length < target){
      const opts = cells.filter(n=>!n.used && piece.some(p=>Math.abs(n.x-p.x)+Math.abs(n.y-p.y)===1));
      if(!opts.length) break;
      const n = opts[Math.floor(Math.random()*opts.length)];
      n.used=true;
      piece.push(n);
    }
    result.push(piece);
  }
  return result;
}

function startLevel(){
  cleared=false;
  reveal=false;
  spaceLife=4;
  renderSpaceLife();

  gridSize=levels[level];
  cell=Math.floor(BOARD_PIXEL/gridSize);
  pieces=[];

  const shapes=splitBoard(gridSize);
  let cx=20,cy=20,rowH=0;

  shapes.forEach(shape=>{
    const minX=Math.min(...shape.map(b=>b.x));
    const minY=Math.min(...shape.map(b=>b.y));
    const maxX=Math.max(...shape.map(b=>b.x));
    const maxY=Math.max(...shape.map(b=>b.y));
    const w=(maxX-minX+1)*cell;
    const h=(maxY-minY+1)*cell;

    if(cx+w>canvas.width-20){cx=20;cy+=rowH+cell*0.5;rowH=0;}

    pieces.push({ 
      shape, 
      x:cx-minX*cell, 
      y:cy-minY*cell, 
      homeX:cx-minX*cell, 
      homeY:cy-minY*cell, 
      placed:false,
      rotation:0,
      mustRotate:false,
      width:maxX-minX+1,
      height:maxY-minY+1
    });

    cx+=w+cell*0.5;
    rowH=Math.max(rowH,h);
  });

  gridX=canvas.width/2-gridSize*cell/2;
  gridY=50;

  startTime=Date.now();
  elapsedTime=0;
  clearInterval(timerInterval);
  timerInterval=setInterval(updateTimer,50);
  updateBestScoreUI();
}

function updateTimer(){
  if(cleared) return;
  elapsedTime=(Date.now()-startTime)/1000;
  timerUI.textContent=`TIME: ${elapsedTime.toFixed(1)}s`;
  const key=`levelL1-${level}`;
  const best=bestScores[key]||0;
  bestScoreUI.textContent=`BEST: ${best.toFixed(1)}s`;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle="#000";
  for(let i=1;i<gridSize;i++){
    ctx.beginPath(); ctx.moveTo(gridX+i*cell,gridY); ctx.lineTo(gridX+i*cell,gridY+gridSize*cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(gridX,gridY+i*cell); ctx.lineTo(gridX+gridSize*cell,gridY+i*cell); ctx.stroke();
  }
  ctx.lineWidth=3; ctx.strokeStyle="#000"; ctx.strokeRect(gridX,gridY,gridSize*cell,gridSize*cell); ctx.lineWidth=1;

  pieces.forEach(p=>{
    ctx.save();
    ctx.translate(p.x+cell/2,p.y+cell/2);
    ctx.rotate(p.rotation*Math.PI/180);
    ctx.translate(-p.x-cell/2,-p.y-cell/2);

    if(!reveal){ 
      p.shape.forEach(b=>{ 
        const px=p.x+b.x*cell; 
        const py=p.y+b.y*cell; 
        ctx.strokeStyle="#000"; 
        ctx.strokeRect(px,py,cell,cell); 
      }); 
      ctx.restore(); 
      return; 
    }

    if(p.placed){
      ctx.fillStyle="#000";
      p.shape.forEach(b=>{
        const px=p.x+b.x*cell;
        const py=p.y+b.y*cell;
        ctx.fillRect(px,py,cell,cell);
      });
    } else {
      ctx.strokeStyle="#000";
      p.shape.forEach(b=>{
        const px=p.x+b.x*cell;
        const py=p.y+b.y*cell;
        ctx.strokeRect(px,py,cell,cell);
      });
    }

    ctx.restore();
  });

  requestAnimationFrame(draw);
}
  function getMousePos(e){
  const rect = canvas.getBoundingClientRect();
  return {
    x:(e.clientX-rect.left)*(canvas.width/rect.width),
    y:(e.clientY-rect.top)*(canvas.height/rect.height)
  };
}

canvas.addEventListener("mousedown",e=>{
  const m=getMousePos(e);

  for(let i=pieces.length-1;i>=0;i--){
    const p=pieces[i];

    for(const b of p.shape){
      const px=p.x+b.x*cell;
      const py=p.y+b.y*cell;

      if(
        m.x>px && m.x<px+cell &&
        m.y>py && m.y<py+cell
      ){
        dragging=p;
        ox=m.x-p.x;
        oy=m.y-p.y;
        return;
      }
    }
  }
});

canvas.addEventListener("mousemove",e=>{
  if(!dragging) return;

  const m=getMousePos(e);
  dragging.x=m.x-ox;
  dragging.y=m.y-oy;
});

window.addEventListener("mouseup",()=>{
  if(!dragging) return;

  const snapRange=cell*0.6;

  dragging.shape.forEach(b=>{
    const px=dragging.x+b.x*cell;
    const py=dragging.y+b.y*cell;

    const gx=Math.round((px-gridX)/cell);
    const gy=Math.round((py-gridY)/cell);

    const targetX=gridX+gx*cell-b.x*cell;
    const targetY=gridY+gy*cell-b.y*cell;

    if(
      gx>=0 && gx<gridSize &&
      gy>=0 && gy<gridSize &&
      Math.abs(px-(gridX+gx*cell))<snapRange &&
      Math.abs(py-(gridY+gy*cell))<snapRange
    ){
      dragging.x=targetX;
      dragging.y=targetY;
      dragging.placed=true;
    }
  });

  dragging=null;

  checkClear();
});

function checkClear(){

  const board=Array.from({length:gridSize},()=>Array(gridSize).fill(false));

  pieces.forEach(p=>{
    if(!p.placed) return;

    p.shape.forEach(b=>{
      const gx=Math.round((p.x+b.x*cell-gridX)/cell);
      const gy=Math.round((p.y+b.y*cell-gridY)/cell);

      if(
        gx>=0 && gx<gridSize &&
        gy>=0 && gy<gridSize
      ){
        board[gy][gx]=true;
      }
    });
  });

  for(let y=0;y<gridSize;y++){
    for(let x=0;x<gridSize;x++){
      if(!board[y][x]) return;
    }
  }

  cleared=true;
  clearInterval(timerInterval);

  const key=`levelL1-${level}`;
  const best=bestScores[key];

  if(!best || elapsedTime<best){
    bestScores[key]=elapsedTime;
    localStorage.setItem("bestScores",JSON.stringify(bestScores));
  }

  if(level>=reachedLevel.L1){
    reachedLevel.L1=level+1;
    localStorage.setItem("reachedLevel",JSON.stringify(reachedLevel));
  }

  clearText.textContent="CLEAR!";
  scoreText.textContent=`TIME : ${elapsedTime.toFixed(1)}s`;

  transitionScreen(gameUI,clearUI);
}
draw();
</script>
</body>
</html>
