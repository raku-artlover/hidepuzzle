<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HIDE PUZZLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#fff;
font-family: Helvetica, Arial, sans-serif;
display:flex;
justify-content:center;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#fff;
}

h1{
font-size:48px;
margin-bottom:20px;
}

.btn{
padding:12px 40px;
border:2px solid #000;
font-size:18px;
background:none;
cursor:pointer;
margin:5px;
}

#game{
display:none;
flex-direction:column;
align-items:center;
width:100%;
max-width:500px;
}

/* 上部UI */

#topUI{
width:90%;
max-width:450px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

#leftUI,
#centerUI,
#rightUI{
display:flex;
align-items:center;
gap:10px;
}

#centerUI{
flex-direction:column;
}

#timer{
font-size:20px;
font-weight:bold;
}

#bestScoreUI{
font-size:16px;
}

/* 残機 */

#spaceLife{
display:flex;
gap:6px;
}

.lifeDot{
width:18px;
height:18px;
border-radius:50%;
background:#000;
}

/* canvas */

canvas{
background:#fff;
width:90%;
max-width:450px;
margin-top:15px;
}

/* reveal */

#revealBtnContainer{
margin-top:10px;
}

#levelButtons{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

#levelButtons button:disabled{
opacity:0.3;
}

</style>
</head>

<body>

<!-- TITLE -->

<div id="title" class="screen">

<h1>HIDE PUZZLE</h1>

<button id="start" class="btn">START</button>

<button id="menu" class="btn">MENU</button>

<button id="rulesBtn" class="btn">RULES</button>

</div>


<!-- RULES -->

<div id="rulesScreen" class="screen" style="display:none">

<h1>RULES</h1>

<p style="max-width:320px;text-align:center;line-height:1.7">

ピースをドラッグして  
正しい位置に並べよう  

<br><br>

REVEALを押すと  
完成形を見ることができる  

<br><br>

しかし  
TIMEが +5秒  

<br><br>

REVEALは4回まで  
使い切るとGAME OVER

</p>

<button id="rulesBack" class="btn">BACK</button>

</div>


<!-- MENU -->

<div id="menuScreen" class="screen" style="display:none">

<h1>SELECT LEVEL</h1>

<div id="levelButtons"></div>

<button id="menuBack" class="btn">BACK</button>

</div>


<!-- CLEAR -->

<div id="clear" class="screen" style="display:none">

<h1 id="clearText"></h1>

<p id="scoreText"></p>

<button id="next" class="btn">NEXT</button>

<button id="retry" class="btn">RETRY</button>

<button id="clearHome" class="btn">HOME</button>

</div>


<!-- GAME OVER -->

<div id="gameOver" class="screen" style="display:none">

<h1>GAME OVER</h1>

<button id="goHome" class="btn">HOME</button>

<button id="goRetry" class="btn">RETRY</button>

</div>


<!-- GAME -->

<div id="game">

<div id="topUI">

<div id="leftUI">

<button id="home" class="btn">HOME</button>

</div>

<div id="centerUI">

<div id="timer">TIME: 0.0s</div>

<div id="spaceLife"></div>

</div>

<div id="rightUI">

<div id="bestScoreUI">BEST: 0.0s</div>

<button id="reset" class="btn">RESET</button>

</div>

</div>

<canvas id="c" width="450" height="450"></canvas>

<div id="revealBtnContainer">

<button id="revealBtn" class="btn">REVEAL</button>

</div>

</div>


<script>

/* RULES画面 */

const title=document.getElementById("title");
const rulesScreen=document.getElementById("rulesScreen");

document.getElementById("rulesBtn").onclick=()=>{

title.style.display="none";
rulesScreen.style.display="flex";

};

document.getElementById("rulesBack").onclick=()=>{

rulesScreen.style.display="none";
title.style.display="flex";

};

/* ここから元コード */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let LEVELS = [4,5,6,7];
let levels = LEVELS;
let level = 0;
let cleared = false;
let reveal = false;

let gridSize, cell, gridX, gridY;
let pieces = [];

const timerUI = document.getElementById("timer");
const bestScoreUI = document.getElementById("bestScoreUI");
const spaceLifeDiv = document.getElementById("spaceLife");

let startTime;
let elapsedTime=0;

let timerInterval;

let spaceLife = 4;

/* 残機 */

function renderSpaceLife(){

spaceLifeDiv.innerHTML="";

for(let i=0;i<spaceLife;i++){

const dot=document.createElement("div");

dot.className="lifeDot";

spaceLifeDiv.appendChild(dot);

}

}

/* ステージ */

function startLevel(){

spaceLife=4;

renderSpaceLife();

gridSize=LEVELS[level];

cell=Math.floor(300/gridSize);

startTime=Date.now();

clearInterval(timerInterval);

timerInterval=setInterval(updateTimer,50);

}

/* タイマー */

function updateTimer(){

elapsedTime=(Date.now()-startTime)/1000;

timerUI.textContent="TIME: "+elapsedTime.toFixed(1)+"s";

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
