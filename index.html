<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HIDE PUZZLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#fff;
font-family: Helvetica, Arial, sans-serif;
touch-action:none;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#fff;
}

h1{
font-size:48px;
letter-spacing:0.05em;
margin-bottom:20px;
}

.btn{
padding:12px 40px;
border:2px solid #000;
font-size:18px;
background:none;
cursor:pointer;
margin:5px;
}

#game{
display:none;
position:relative;
width:100vw;
height:100vh;
}

canvas{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:#fff;
}

#timer{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
font-size:22px;
font-weight:bold;
}

#bestScoreUI{
position:absolute;
top:20px;
right:20px;
font-size:18px;
}

#home{
position:absolute;
top:20px;
right:20px;
}

#reset{
position:absolute;
top:20px;
left:20px;
}

#spaceLife{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
}

.lifeDot{
width:20px;
height:20px;
border-radius:50%;
background:#000;
}

#revealBtn{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
}

</style>
</head>

<body>

<div id="title" class="screen">
<h1>HIDE PUZZLE</h1>
<button id="start" class="btn">START</button>
</div>

<div id="game">

<button id="reset" class="btn">RESET</button>
<button id="home" class="btn">HOME</button>

<div id="timer">TIME: 0.0s</div>
<div id="bestScoreUI">BEST: 0.0s</div>

<canvas id="c"></canvas>

<button id="revealBtn" class="btn">REVEAL</button>

<div id="spaceLife"></div>

</div>

<script>

const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

const title=document.getElementById("title");
const gameUI=document.getElementById("game");

const timerUI=document.getElementById("timer");
const bestScoreUI=document.getElementById("bestScoreUI");

let LEVELS=[4,5,6,7];
let level=0;

let gridSize;
let cell;
let gridX;
let gridY;

let pieces=[];
let dragging=null;
let ox=0;
let oy=0;

let startTime;
let elapsedTime=0;

const spaceLifeDiv=document.getElementById("spaceLife");

let spaceLife=4;

let bestScores=JSON.parse(localStorage.getItem("bestScores")||"{}");

document.getElementById("start").onclick=()=>{
title.style.display="none";
gameUI.style.display="block";
resizeCanvas();
startLevel();
};

window.addEventListener("resize",resizeCanvas);

function resizeCanvas(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

function renderSpaceLife(){

spaceLifeDiv.innerHTML="";

for(let i=0;i<spaceLife;i++){

const dot=document.createElement("div");
dot.className="lifeDot";

spaceLifeDiv.appendChild(dot);

}

}

function startLevel(){

gridSize=LEVELS[level];

const boardSize=Math.min(canvas.width,canvas.height)*0.6;

cell=Math.floor(boardSize/gridSize);

pieces=[];

const shapes=splitBoard(gridSize);

let cx=40;
let cy=40;

shapes.forEach(shape=>{

const minX=Math.min(...shape.map(b=>b.x));
const minY=Math.min(...shape.map(b=>b.y));

pieces.push({

shape,
x:cx-minX*cell,
y:cy-minY*cell,
placed:false

});

cx+=cell*2;

});

gridX=canvas.width/2-gridSize*cell/2;
gridY=canvas.height/2-gridSize*cell/2;

spaceLife=4;

renderSpaceLife();

startTime=Date.now();

}

function splitBoard(size){

const cells=[];

for(let y=0;y<size;y++)
for(let x=0;x<size;x++)
cells.push({x,y,used:false});

const result=[];

while(cells.some(c=>!c.used)){

const start=cells.find(c=>!c.used);

start.used=true;

const piece=[start];

const target=Math.floor(Math.random()*3)+2;

while(piece.length<target){

const opts=cells.filter(n=>!n.used && piece.some(p=>Math.abs(n.x-p.x)+Math.abs(n.y-p.y)===1));

if(!opts.length)break;

const n=opts[Math.floor(Math.random()*opts.length)];

n.used=true;

piece.push(n);

}

result.push(piece);

}

return result;

}

function getMousePos(e){

const rect=canvas.getBoundingClientRect();

return{

x:(e.clientX-rect.left)*(canvas.width/rect.width),
y:(e.clientY-rect.top)*(canvas.height/rect.height)

};

}

canvas.addEventListener("mousedown",e=>{

const m=getMousePos(e);

for(let i=pieces.length-1;i>=0;i--){

const p=pieces[i];

for(const b of p.shape){

const px=p.x+b.x*cell;
const py=p.y+b.y*cell;

if(m.x>px&&m.x<px+cell&&m.y>py&&m.y<py+cell){

dragging=p;

ox=m.x-p.x;
oy=m.y-p.y;

return;

}

}

}

});

canvas.addEventListener("mousemove",e=>{

if(!dragging)return;

const m=getMousePos(e);

dragging.x=m.x-ox;
dragging.y=m.y-oy;

});

window.addEventListener("mouseup",()=>{

dragging=null;

});

function updateTimer(){

elapsedTime=(Date.now()-startTime)/1000;

timerUI.textContent=`TIME: ${elapsedTime.toFixed(1)}s`;

const best=bestScores[level]||0;

bestScoreUI.textContent=`BEST: ${best.toFixed(1)}s`;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

updateTimer();

ctx.strokeStyle="#000";

for(let i=1;i<gridSize;i++){

ctx.beginPath();
ctx.moveTo(gridX+i*cell,gridY);
ctx.lineTo(gridX+i*cell,gridY+gridSize*cell);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(gridX,gridY+i*cell);
ctx.lineTo(gridX+gridSize*cell,gridY+i*cell);
ctx.stroke();

}

ctx.lineWidth=3;
ctx.strokeRect(gridX,gridY,gridSize*cell,gridSize*cell);
ctx.lineWidth=1;

pieces.forEach(p=>{

p.shape.forEach(b=>{

const px=p.x+b.x*cell;
const py=p.y+b.y*cell;

ctx.strokeRect(px,py,cell,cell);

});

});

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
