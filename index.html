
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HIDE PUZZLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#fff;
font-family: Helvetica, Arial, sans-serif;
display:flex;
justify-content:center;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#fff;
}

h1{
font-size:48px;
letter-spacing:0.05em;
margin-bottom:20px;
text-align:center;
}

.btn{
padding:12px 40px;
border:2px solid #000;
font-size:18px;
background:none;
cursor:pointer;
margin:6px;
}

#game{
display:none;
flex-direction:column;
align-items:center;
width:100%;
max-width:500px;
}

/* 上部UI */

#topUI{
width:90%;
max-width:450px;
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

#leftUI,
#centerUI,
#rightUI{
display:flex;
align-items:center;
gap:10px;
}

#centerUI{
flex-direction:column;
}

#timer{
font-size:20px;
font-weight:bold;
}

#bestScoreUI{
font-size:16px;
}

/* 残機 */

#spaceLife{
display:flex;
gap:6px;
}

.lifeDot{
width:18px;
height:18px;
border-radius:50%;
background:#000;
}

/* canvas */

canvas{
background:#fff;
width:90%;
max-width:450px;
margin-top:15px;
}

/* reveal */

#revealBtnContainer{
margin-top:10px;
}

/* レベルボタン */

#levelButtons{
display:flex;
flex-wrap:wrap;
justify-content:center;
max-width:300px;
}

#levelButtons button:disabled{
opacity:0.3;
}

</style>
</head>

<body>

<!-- タイトル -->

<div id="title" class="screen">

<h1>HIDE PUZZLE</h1>

<button id="start" class="btn">START</button>

<button id="menu" class="btn">MENU</button>

<button id="rulesBtn" class="btn">RULES</button>

</div>


<!-- ルール -->

<div id="rulesScreen" class="screen" style="display:none">

<h1>RULES</h1>

<p style="max-width:320px;text-align:center;line-height:1.7">

ピースをドラッグして  
正しい位置に並べよう。  

<br><br>

REVEALを押すと  
完成形を見ることができる。  

<br><br>

しかし  
TIMEが +5秒 増える。  

<br><br>

REVEALは4回まで。  
使い切ると GAME OVER。

</p>

<button id="rulesBack" class="btn">BACK</button>

</div>


<!-- レベル -->

<div id="menuScreen" class="screen" style="display:none">

<h1>SELECT LEVEL</h1>

<div id="levelButtons"></div>

<button id="menuBack" class="btn">BACK</button>

</div>


<!-- クリア -->

<div id="clear" class="screen" style="display:none">

<h1 id="clearText"></h1>

<p id="scoreText"></p>

<button id="next" class="btn">NEXT</button>

<button id="retry" class="btn">RETRY</button>

<button id="clearHome" class="btn">HOME</button>

</div>


<!-- GAME OVER -->

<div id="gameOver" class="screen" style="display:none">

<h1>GAME OVER</h1>

<button id="goHome" class="btn">HOME</button>

<button id="goRetry" class="btn">RETRY</button>

</div>


<!-- GAME -->

<div id="game">

<div id="topUI">

<div id="leftUI">
<button id="home" class="btn">HOME</button>
</div>

<div id="centerUI">

<div id="timer">TIME: 0.0s</div>

<div id="spaceLife"></div>

</div>

<div id="rightUI">

<div id="bestScoreUI">BEST: 0.0s</div>

<button id="reset" class="btn">RESET</button>

</div>

</div>

<canvas id="c" width="450" height="450"></canvas>

<div id="revealBtnContainer">

<button id="revealBtn" class="btn">REVEAL</button>

</div>

</div>


<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let LEVELS=[4,5,6,7];
let level=0;

let gridSize,cell,gridX,gridY;

let pieces=[];
let dragging=null;

let reveal=false;

let startTime;
let elapsedTime=0;

let timerInterval;

let spaceLife=4;

const timerUI=document.getElementById("timer");
const bestScoreUI=document.getElementById("bestScoreUI");
const spaceLifeDiv=document.getElementById("spaceLife");

const title=document.getElementById("title");
const rulesScreen=document.getElementById("rulesScreen");
const menuScreen=document.getElementById("menuScreen");
const gameUI=document.getElementById("game");

function show(a,b){

a.style.display="none";
b.style.display="flex";

}

/* ルール */

rulesBtn.onclick=()=>show(title,rulesScreen);
rulesBack.onclick=()=>show(rulesScreen,title);

/* メニュー */

menu.onclick=()=>{

renderLevelButtons();
show(title,menuScreen);

};

menuBack.onclick=()=>show(menuScreen,title);

/* スタート */

start.onclick=()=>{

show(title,gameUI);
startLevel();

};

home.onclick=()=>{

show(gameUI,title);

};

reset.onclick=startLevel;

/* 残機表示 */

function renderSpaceLife(){

spaceLifeDiv.innerHTML="";

for(let i=0;i<spaceLife;i++){

const dot=document.createElement("div");

dot.className="lifeDot";

spaceLifeDiv.appendChild(dot);

}

}

/* レベルボタン */

function renderLevelButtons(){

levelButtons.innerHTML="";

LEVELS.forEach((s,i)=>{

const b=document.createElement("button");

b.className="btn";

b.textContent=s+"×"+s;

b.onclick=()=>{

level=i;

show(menuScreen,gameUI);

startLevel();

};

levelButtons.appendChild(b);

});

}

/* ピース生成 */

function splitBoard(size){

const cells=[];

for(let y=0;y<size;y++)
for(let x=0;x<size;x++)
cells.push({x,y,used:false});

const result=[];

while(cells.some(c=>!c.used)){

const start=cells.find(c=>!c.used);

start.used=true;

const piece=[start];

const target=2+Math.floor(Math.random()*3);

while(piece.length<target){

const opts=cells.filter(n=>

!n.used &&

piece.some(p=>Math.abs(n.x-p.x)+Math.abs(n.y-p.y)===1)

);

if(!opts.length)break;

const n=opts[Math.floor(Math.random()*opts.length)];

n.used=true;

piece.push(n);

}

result.push(piece);

}

return result;

}

/* ステージ */

function startLevel(){

spaceLife=4;

renderSpaceLife();

gridSize=LEVELS[level];

cell=Math.floor(300/gridSize);

pieces=[];

const shapes=splitBoard(gridSize);

let cx=20,cy=20,rowH=0;

shapes.forEach(shape=>{

const minX=Math.min(...shape.map(b=>b.x));
const minY=Math.min(...shape.map(b=>b.y));

pieces.push({

shape,

x:cx-minX*cell,

y:cy-minY*cell,

placed:false

});

cx+=cell*3;

});

gridX=canvas.width/2-gridSize*cell/2;

gridY=60;

startTime=Date.now();

clearInterval(timerInterval);

timerInterval=setInterval(updateTimer,50);

}

/* タイマー */

function updateTimer(){

elapsedTime=(Date.now()-startTime)/1000;

timerUI.textContent="TIME: "+elapsedTime.toFixed(1)+"s";

}

/* 描画 */

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#000";

for(let i=1;i<gridSize;i++){

ctx.beginPath();

ctx.moveTo(gridX+i*cell,gridY);

ctx.lineTo(gridX+i*cell,gridY+gridSize*cell);

ctx.stroke();

ctx.beginPath();

ctx.moveTo(gridX,gridY+i*cell);

ctx.lineTo(gridX+gridSize*cell,gridY+i*cell);

ctx.stroke();

}

ctx.strokeRect(gridX,gridY,gridSize*cell,gridSize*cell);

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
