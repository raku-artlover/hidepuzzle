<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>HIDE PUZZLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
background:#fff;
font-family: Helvetica, Arial, sans-serif;
display:flex;
justify-content:center;
}

.screen{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#fff;
z-index:5;
}

h1{
font-size:48px;
letter-spacing:0.05em;
margin-bottom:20px;
}

.btn{
padding:12px 40px;
border:2px solid #000;
font-size:18px;
background:none;
cursor:pointer;
margin:5px;
}

#game{
display:none;
flex-direction:column;
align-items:center;
width:100%;
max-width:900px;
}

#topUI{
display:flex;
gap:20px;
margin-top:10px;
}

#timer,#bestScoreUI{
font-size:20px;
font-weight:bold;
}

#spaceLife{
display:flex;
justify-content:center;
gap:8px;
margin:10px 0;
}

.lifeDot{
width:18px;
height:18px;
border-radius:50%;
background:#000;
}

canvas{
background:#fff;
width:650px;
height:650px;
margin-top:10px;
border:2px solid #000;
}

#clearScreen{
display:none;
}

</style>
</head>

<body>

<div id="title" class="screen">
<h1>HIDE PUZZLE</h1>
<button id="start" class="btn">START</button>
</div>

<div id="clearScreen" class="screen">
<h1>CLEAR</h1>
<div id="clearScore"></div>
<div id="clearBest"></div>
<button id="nextBtn" class="btn">NEXT</button>
</div>

<div id="game">
<div id="topUI">
<div id="timer">TIME: 0.0s</div>
<div id="bestScoreUI">BEST: 0.0s</div>
</div>

<div id="spaceLife"></div>

<canvas id="c" width="650" height="650"></canvas>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let LEVELS=[4,5,6,7];
let level=0;

let gridSize,cell,gridX,gridY;

let pieces=[];
let dragging=null;
let ox=0,oy=0;

let startTime;
let elapsedTime=0;

let bestScores=JSON.parse(localStorage.getItem("bestScores")||"{}");

const timerUI=document.getElementById("timer");
const bestScoreUI=document.getElementById("bestScoreUI");

const title=document.getElementById("title");
const game=document.getElementById("game");
const clearScreen=document.getElementById("clearScreen");

const clearScore=document.getElementById("clearScore");
const clearBest=document.getElementById("clearBest");

document.getElementById("start").onclick=()=>{
title.style.display="none";
game.style.display="flex";
startLevel();
};

document.getElementById("nextBtn").onclick=()=>{
clearScreen.style.display="none";
game.style.display="flex";
level++;
startLevel();
};

function splitBoard(size){

const cells=[];
for(let y=0;y<size;y++)
for(let x=0;x<size;x++)
cells.push({x,y,used:false});

const result=[];

while(cells.some(c=>!c.used)){

const start=cells.find(c=>!c.used);
start.used=true;

const piece=[start];
const target=Math.floor(Math.random()*3)+2;

while(piece.length<target){

const opts=cells.filter(n=>
!n.used &&
piece.some(p=>Math.abs(n.x-p.x)+Math.abs(n.y-p.y)==1)
);

if(!opts.length)break;

const n=opts[Math.floor(Math.random()*opts.length)];
n.used=true;
piece.push(n);

}

result.push(piece);

}

return result;

}

function startLevel(){

gridSize=LEVELS[level];
cell=Math.floor(300/gridSize);

pieces=[];

const shapes=splitBoard(gridSize);

let cx=20;
let cy=420;
let rowH=0;

shapes.forEach(shape=>{

const minX=Math.min(...shape.map(b=>b.x));
const minY=Math.min(...shape.map(b=>b.y));
const maxX=Math.max(...shape.map(b=>b.x));
const maxY=Math.max(...shape.map(b=>b.y));

const w=(maxX-minX+1)*cell;
const h=(maxY-minY+1)*cell;

if(cx+w>canvas.width-20){
cx=20;
cy+=rowH+20;
rowH=0;
}

pieces.push({
shape,
x:cx-minX*cell,
y:cy-minY*cell,
placed:false
});

cx+=w+20;
rowH=Math.max(rowH,h);

});

gridX=canvas.width/2-gridSize*cell/2;
gridY=80;

startTime=Date.now();

}

canvas.onmousedown=e=>{

const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

pieces.forEach(p=>{
p.shape.forEach(b=>{

const px=p.x+b.x*cell;
const py=p.y+b.y*cell;

if(mx>px&&mx<px+cell&&my>py&&my<py+cell){
dragging=p;
ox=mx-p.x;
oy=my-p.y;
}

});
});

};

canvas.onmousemove=e=>{

if(!dragging)return;

const rect=canvas.getBoundingClientRect();

dragging.x=e.clientX-rect.left-ox;
dragging.y=e.clientY-rect.top-oy;

};

canvas.onmouseup=()=>{

if(!dragging)return;

const snapRange=cell*0.6;

dragging.shape.forEach(b=>{

const px=dragging.x+b.x*cell;
const py=dragging.y+b.y*cell;

const gx=Math.round((px-gridX)/cell);
const gy=Math.round((py-gridY)/cell);

if(
gx>=0&&gx<gridSize&&
gy>=0&&gy<gridSize&&
Math.abs(px-(gridX+gx*cell))<snapRange
){

dragging.x=gridX+gx*cell-b.x*cell;
dragging.y=gridY+gy*cell-b.y*cell;
dragging.placed=true;

}

});

dragging=null;

checkClear();

};

function checkClear(){

if(pieces.every(p=>p.placed)){

elapsedTime=(Date.now()-startTime)/1000;

let best=bestScores[level]||9999;

if(elapsedTime<best){
bestScores[level]=elapsedTime;
localStorage.setItem("bestScores",JSON.stringify(bestScores));
best=elapsedTime;
}

clearScore.innerText="TIME : "+elapsedTime.toFixed(1)+"s";
clearBest.innerText="BEST : "+best.toFixed(1)+"s";

game.style.display="none";
clearScreen.style.display="flex";

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=1;i<gridSize;i++){

ctx.beginPath();
ctx.moveTo(gridX+i*cell,gridY);
ctx.lineTo(gridX+i*cell,gridY+gridSize*cell);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(gridX,gridY+i*cell);
ctx.lineTo(gridX+gridSize*cell,gridY+i*cell);
ctx.stroke();

}

ctx.lineWidth=3;
ctx.strokeRect(gridX,gridY,gridSize*cell,gridSize*cell);
ctx.lineWidth=1;

pieces.forEach(p=>{

p.shape.forEach(b=>{

const px=p.x+b.x*cell;
const py=p.y+b.y*cell;

ctx.strokeRect(px,py,cell,cell);

});

});

timerUI.innerText="TIME: "+((Date.now()-startTime)/1000).toFixed(1)+"s";

requestAnimationFrame(draw);

}

draw();

</script>
</body>
</html>
